<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Facebook Auto-Poster</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FB Poster">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 12px;
    padding: 2.5rem;
    width: 100%;
    max-width: 380px;
  }
  .logo {
    text-align: center;
    margin-bottom: 2rem;
  }
  .logo h1 { font-size: 1.3rem; color: #7c8cf8; }
  .logo p  { font-size: 0.8rem; color: #64748b; margin-top: 0.3rem; }
  label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.4rem; }
  input[type="password"] {
    width: 100%;
    background: #0f1117;
    border: 1px solid #2d3148;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: #e2e8f0;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: #7c8cf8; }
  button {
    width: 100%;
    margin-top: 1.2rem;
    background: #7c8cf8;
    border: none;
    border-radius: 8px;
    padding: 0.8rem;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #6470e8; }
  .error {
    background: #3b1219;
    border: 1px solid #7f1d1d;
    border-radius: 8px;
    padding: 0.7rem 1rem;
    color: #fca5a5;
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Facebook Auto-Poster</h1>
    <p>Panel de administración</p>
  </div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/admin/login">
    <label for="key">Clave de acceso</label>
    <input type="password" id="key" name="key" placeholder="ADMIN_KEY" autofocus required>
    <button type="submit">Ingresar</button>
  </form>
</div>
</body>
</html>
